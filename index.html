<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator - By Code Traversal</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <input type="text" id="inputBox" placeholder="0" />
        
        <div>
          <button class="button operator"><p>2<sup>nd</sup></p></button>
          <button class="button operator">π</button>
          <button class="button operator">e</button>
          <button class="button operator">C</button>
          <button class="button operator">DEL</button>
        </div>
        <div>
          <button class="button operator">x²</button>
          <button class="button operator">1/x</button>
          <button class="button operator">|x|</button>
          <button class="button operator">exp</button>
          <button class="button operator">mod</button>
        </div>
        <div>
          <button class="button operator">&radic;</button>
          <button class="button operator">(</button>
          <button class="button operator">)</button>
          <button class="button operator">n!</button>
          </button>
          <button class="button operator">/</button>
        </div>
        <div>
          <button class="button operator"><p>x<sup>y</sup></p></button>
          <button class="button">7</button>
          <button class="button">8</button>
          <button class="button">9</button>
          <button class="button operator">*</button>
        </div>
        <div>
          <button class="button operator"><p>10ˣ</p></button>
          <button class="button">4</button>
          <button class="button">5</button>
          <button class="button">6</button>
          <button class="button operator">-</button>
        </div>
        <div>
          <button class="button operator">log</button>
          <button class="button">1</button>
          <button class="button">2</button>
          <button class="button">3</button>
          <button class="button operator">+</button>
        </div>

        <div>
          <button class="button operator">ln</button>
          <button class="button">00</button>
          <button class="button">0</button>
          <button class="button">.</button>
          <button class="button equalBtn">=</button>
        </div>
      </div>
    </div>
    <script src="/js/main.js"></script>
  </body>
</html>
